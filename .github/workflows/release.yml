name: Release the version

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest

          - name: macOS
            os: macos-latest

          - name: iOS
            os: macos-latest
            target: iOS

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          export-pdb: true
          export-symbols: true
          target: ${{ matrix.config.target }}
          build-config: ${{ matrix.config.name == 'Windows' && 'RelWithDebInfo' || 'Release' }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v7
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' mod.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare changelog
        id: changelog
        run: |
          python3 - <<'EOF'
          import re, sys, os

          version = "${{ steps.version.outputs.version }}"
          changelog_path = "CHANGELOG.md"

          with open(changelog_path, "r", encoding="utf-8") as f:
            changelog = f.read()

          pattern = rf"(?m)^# {re.escape(version)}\n(.*?)(?=^# |\Z)"
          match = re.search(pattern, changelog, re.DOTALL)

          if not match:
            print(f"::error::Changelog entry for '{version}' not found.")
            sys.exit(1)

          section = match.group(1).strip()
          section = re.sub(r"<c[a-zA-Z]>", "**", section)
          section = re.sub(r"</c>", "**", section)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"changelog<<__CHANGELOG_EOF__\n{section}\n__CHANGELOG_EOF__\n")
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            ${{ steps.build.outputs.build-output }}/*.geode
            ${{ steps.build.outputs.build-output }}/*.pdb
            ${{ steps.build.outputs.build-output }}/*.sym